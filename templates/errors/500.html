<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>500 Server Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4 text-white">
  <div class="text-center max-w-md">
    <div class="w-20 h-20 bg-amber-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-amber-500/30">
      <i class="fas fa-triangle-exclamation text-amber-400 text-3xl"></i>
    </div>
    <h1 class="text-6xl font-black text-amber-500 mb-2">500</h1>
    <h2 class="text-xl font-bold text-slate-200 mb-3">Internal Server Error</h2>
    <p class="text-slate-400 text-sm mb-8">Something went wrong on our end. The error has been logged. Please try again or contact the administrator if the issue persists.</p>
    <div class="flex justify-center gap-3">
      <a href="javascript:history.back()" class="px-5 py-2.5 border border-slate-600 rounded-xl text-sm text-slate-300 hover:bg-slate-800 transition-colors">
        <i class="fas fa-arrow-left mr-2"></i>Go Back
      </a>
      <a href="/" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-medium transition-colors">
        <i class="fas fa-home mr-2"></i>Home
      </a>
    </div>
  </div>
</body>
</html>
